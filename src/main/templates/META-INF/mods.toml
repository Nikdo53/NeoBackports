modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

issueTrackerURL="https://github.com/Nikdo53/NeoBackports/issues" #optional

[[mods]]

modId="${mod_id}"
version="${mod_version}" #mandatory
displayName="${mod_name}" #mandatory
displayURL="https://github.com/Nikdo53/NeoBackports/" #optional
logoFile="neobackports_icon.png" #optional
credits="The NeoForged team - datamaps and various other stuff" #optional

authors="${mod_authors}" #optional

description='''${mod_description}'''

[[dependencies.${mod_id}]] #optional
    modId="forge" #mandatory
    mandatory=true #mandatory
    versionRange="${forge_version_range}" #mandatory
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
